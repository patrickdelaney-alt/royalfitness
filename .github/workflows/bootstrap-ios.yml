name: Bootstrap iOS Project

# Run this ONCE manually to generate the ios/ Xcode project and commit it back.
# After this runs successfully, use the "iOS Build & Deploy" workflow for all future builds.
on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Generate & Commit ios/ Directory
    runs-on: macos-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      # ── 1. Code ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node / npm ────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Generate iOS project ───────────────────────────────────────────────
      - name: Add Capacitor iOS platform
        run: npx cap add ios

      # ── 4. Install CocoaPods dependencies ────────────────────────────────────
      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          cd ios/App && pod install

      # ── 5. Commit ios/ back to the branch ────────────────────────────────────
      - name: Commit generated iOS project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/
          git status
          git commit -m "Bootstrap: Add generated Capacitor iOS project

          Generated by running \`npx cap add ios\` + \`pod install\`.
          The ios/ directory is required for the iOS build pipeline."
          git push origin HEAD
